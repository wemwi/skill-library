name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # PAT ist Pflicht (NICHT GITHUB_TOKEN): nur ein PAT-Push triggert den
          # zweiten release-please-Run, der nach dem Auto-Merge Tag + Release setzt.
          # Mit GITHUB_TOKEN bliebe der Release ungetaggt (autorelease: pending).
          # Secret: contents:write + pull-requests:write. Siehe references/automation.md.
          token: ${{ secrets.RELEASE_PLEASE }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Checkout noetig, weil gh pr merge lokal ins Git-Repo schaut.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.pr }}

      # Release-PR sofort mergen, sobald release-please einen geoeffnet hat.
      # KEIN --auto: natives Auto-Merge gibt es nur bei Repos mit Required Checks
      # (und in privaten Repos erst ab GitHub Pro). Ohne Required Checks ist der PR
      # sofort mergebar -> direkter Merge. Merge auf main -> Cloudflare deployt.
      # Laeuft NICHT im zweiten Run (kein offener Release-PR -> kein pr-Output).
      - name: Release-PR automatisch mergen
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE }}
        run: gh pr merge --squash "${{ fromJson(steps.release.outputs.pr).number }}"
