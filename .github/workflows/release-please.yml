name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Standard: eingebautes GITHUB_TOKEN.
          # Nur ersetzen, wenn auf den Release-PRs zusätzlich GitHub-Actions-CI
          # laufen soll (dann PAT als Secret hinterlegen und hier referenzieren).
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
